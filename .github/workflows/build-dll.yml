name: build-CorelNestEngine-dll

# يبني CorelNestEngine.dll (64-بت) على خادم ويندوز بمترجم MSVC،
# ينشئ ملف الترخيص من GitHub Secret أثناء البناء،
# ثم يتيح الـ DLL للتنزيل كـ Artifact.
#
# ملاحظة: أُزيلت خطوة الاختبار الذاتي (nest_test) لأن نظام التفعيل في v1.0
# يرفض CNE_Begin على أي جهاز غير مُفعَّل — وخادم GitHub مؤقت وغير مُفعَّل،
# فلا يمكن تشغيل الاختبار هنا. تحقّق من الأداة على جهازك المُفعَّل بدل ذلك.

on:
  workflow_dispatch:
  push:

jobs:
  build-x64:
    runs-on: windows-latest

    steps:
      - name: Checkout sources
        uses: actions/checkout@v4

      # إنشاء ملف الترخيص مؤقتاً أثناء البناء.
      # السر يُمرَّر عبر env: (متغيّر بيئة) وليس مباشرة داخل نص السكربت،
      # لأن الملف متعدد الأسطر — لصقه نصياً داخل echo يكسر أمر bash.
      - name: Create nest_license.h
        shell: bash
        env:
          NEST_LICENSE_H: ${{ secrets.NEST_LICENSE_H }}
        run: |
          if [ -z "$NEST_LICENSE_H" ]; then
            echo "ERROR: NEST_LICENSE_H secret is not configured"
            exit 1
          fi
          printf '%s\n' "$NEST_LICENSE_H" > nest_license.h
          echo "nest_license.h written, $(wc -l < nest_license.h) lines"

      - name: Configure (x64 / MSVC)
        run: cmake -S . -B build -A x64

      - name: Build (Release)
        run: cmake --build build --config Release

      - name: List output
        run: dir build\Release

      - name: Upload DLL artifact
        uses: actions/upload-artifact@v4
        with:
          name: CorelNestEngine-x64
          path: build/Release/CorelNestEngine.dll
          if-no-files-found: error
