name: build-CorelNestEngine-dll

# يبني CorelNestEngine.dll (64-بت) على خادم ويندوز بمترجم MSVC،
# ينشئ ملف الترخيص من GitHub Secret أثناء البناء،
# يشغّل الاختبار الذاتي، ثم يتيح الـ DLL للتنزيل كـ Artifact.

on:
  workflow_dispatch:
  push:

jobs:
  build-x64:
    runs-on: windows-latest

    steps:
      - name: Checkout sources
        uses: actions/checkout@v4

      # إنشاء ملف الترخيص مؤقتاً أثناء البناء
      - name: Create nest_license.h
        shell: bash
        run: |
          if [ -z "${{ secrets.NEST_LICENSE_H }}" ]; then
            echo "ERROR: NEST_LICENSE_H secret is not configured"
            exit 1
          fi
          echo "${{ secrets.NEST_LICENSE_H }}" > nest_license.h

      - name: Configure (x64 / MSVC)
        run: cmake -S . -B build -A x64

      - name: Build (Release)
        run: cmake --build build --config Release

      - name: Run self-test (nest_test)
        run: ctest --test-dir build -C Release --output-on-failure

      - name: List output
        run: dir build\Release

      - name: Upload DLL artifact
        uses: actions/upload-artifact@v4
        with:
          name: CorelNestEngine-x64
          path: build/Release/CorelNestEngine.dll
          if-no-files-found: error
